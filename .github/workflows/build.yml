name: Build

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build EasyEDA extension
        run: npm run build

      - name: Check and build MCP
        run: npm run check --workspace=mcp

      - name: Pack MCP
        run: |
          mkdir artifacts
          npm pack --workspace=mcp --pack-destination artifacts
          cp build/dist/*.eext artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: easyeda-copilot-${{ github.sha }}
          path: artifacts/*
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*